apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: boc-mcp
  namespace: boc-mcp
  labels:
    app.kubernetes.io/name: boc-mcp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: boc-mcp
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: boc-mcp
  namespace: boc-mcp
  labels:
    app.kubernetes.io/name: boc-mcp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: boc-mcp
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: boc-mcp
  namespace: boc-mcp
  labels:
    app.kubernetes.io/name: boc-mcp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: boc-mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # 访问博云平台（根据 BOC_BASE_URL 实际地址限制）
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
              - 172.16.0.0/12
              - 10.0.0.0/8
              - 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80