apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: boc-mcp

resources:
  - 00-namespace.yaml
  - 01-config.yaml
  - 02-deployment.yaml
  # 取消下面一行以启用 Ingress（需要集群安装 ingress-nginx）
  # - 03-ingress.yaml

images:
  - name: boc-mcp
    newName: registry.your-company.com/boc-mcp/boc-mcp
    newTag: "0.1.0"