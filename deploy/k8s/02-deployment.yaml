apiVersion: apps/v1
kind: Deployment
metadata:
  name: boc-mcp
  namespace: boc-mcp
  labels:
    app.kubernetes.io/name: boc-mcp
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: boc-mcp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: boc-mcp
        app.kubernetes.io/component: mcp-server
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: boc-mcp
          image: boc-mcp:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: boc-mcp-config
          env:
            - name: BOC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: boc-mcp-credentials
                  key: username
            - name: BOC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boc-mcp-credentials
                  key: password
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: boc-mcp
  namespace: boc-mcp
  labels:
    app.kubernetes.io/name: boc-mcp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: boc-mcp
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP